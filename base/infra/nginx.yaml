---
apiVersion: v1
kind: Namespace
metadata:
  name: nginx-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: nginx-system
spec:
  interval: 10m0s
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx
  namespace: nginx-system
spec:
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  interval: 10m0s
  values:
    controller:
      nodeSelector:
        kubernetes.io/hostname: tails
      service:
        type: NodePort
        nodePorts:
          http: 32080
          https: 32443
